           proxy_set_header Upgrade            $http_upgrade;
           proxy_set_header Connection         $connection_upgrade;
           proxy_buffers                       8 8k;
           proxy_buffer_size                   8k;

           proxy_pass https://keycloak;
       }
   }

   server {
      listen 443 ssl;
       server_name  roomserver.opentalk.test;


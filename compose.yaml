---
services:
  webapp:
    image: ${FRONTEND_IMAGE:-git.opentalk.dev:5050/opentalk/frontend/web/web-app}:${FRONTEND_TAG:-latest}
    depends_on:
      controller:
        condition: service_healthy
    ports:
      - 127.0.0.1:3000:3000
    environment:
      PORT: 3000
      LIVEKIT_SERVER_URL: https://localhost:7880
      CONTROLLER_HOST: localhost:21311
      BASE_URL: https://localhost:8443
      HELPDESK_URL: https://opentalk.eu
      CONTACT_SUPPORT_URL: https://opentalk.eu
      IMPRINT_URL: https://opentalk.eu/en/terms-of-use
      DATA_PROTECTION_URL: https://opentalk.eu/en/data-protection
      OIDC_ISSUER: https://localhost:7443/auth/realms/OPENTALK
      SENTRY_DSN: https://f7a67208e78b4bf6a8fe79ee5a110c24@crash-report.opentalk.eu/5
      INSECURE: 'false'
      FEATURE_SHARED_FOLDER: 'true'
    healthcheck:
      test: 'wget "http://localhost:3000/manifest.json" -O - | grep ''"short_name": "OpenTalk"'''
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - ./:/builds/:rw,Z
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_HOST_AUTH_METHOD: trust

    entrypoint:
      - /bin/bash
      - -c
      - |
        until [ -f "/builds/scripts/init-db.sh" ]; do true; done;
        cp /builds/scripts/init-db.sh /docker-entrypoint-initdb.d/;
        /usr/local/bin/docker-entrypoint.sh postgres;
    healthcheck:
      test: [CMD-SHELL, su, -c, postgres, pg_isready]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:v1.8
    volumes:
      - ./:/builds/:rw,Z
    environment:
      LIVEKIT_HTTP_PORT: 7880
      LIVEKIT_TCP_PORT: 7881
      LIVEKIT_RTC_PORT_RANGE_START: 20000
      LIVEKIT_RTC_PORT_RANGE_END: 39999
      LIVEKIT_RTC_USE_EXTERNAL_IP: 'false'
      LIVEKIT_RTC_ENABLE_LOOPBACK_CANDIDATE: 'true'
      LIVEKIT_KEYS_API_KEY: Controller
      LIVEKIT_KEYS_API_SECRET: QKwu4cYmwisLOU2XyqrWOYEDnap6Nubv
      LIVEKIT_LOGGING_JSON: 'false'
      LIVEKIT_LOGGING_LEVEL: debug
    entrypoint:
      - /bin/sh
      - -c
      - |
        until [ -f "/builds/scripts/livekit-init.sh" ]; do true; done;
        cp /builds//scripts/livekit-init.sh /usr/local/bin;
        livekit-init.sh;
    healthcheck:
      test: wget "http://localhost:7880" -O -
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    ports:
      - 127.0.0.1:5672:5672
    image: rabbitmq:4-management
    healthcheck:
      test: rabbitmq-diagnostics -q ping

  minio:
    image: minio/minio:latest
    ports:
      - 9000:9000
    volumes:
      - ./:/builds/:rw,Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    entrypoint:
      - /bin/bash
      - -c
      - |
        mkdir -p /data/controller &&
        /usr/bin/docker-entrypoint.sh server /data --address ":9000"
    healthcheck:
      test: [CMD, mc, ready, local]
      interval: 5s
      timeout: 5s
      retries: 5

  controller:
    network_mode: host
    depends_on:
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      livekit:
        condition: service_healthy
      certs:
        condition: service_completed_successfully
    image: ${CONTROLLER_IMAGE:-git.opentalk.dev:5050/opentalk/backend/services/controller}:${CONTROLLER_TAG:-dev}
    volumes:
      - ./:/builds/:rw,Z
      - certs-volume:/etc/ssl/certs:ro
    environment:
      SSL_CERT_FILE: /etc/ssl/certs/fullchain.pem
    entrypoint:
      - /bin/bash
      - -c
      - |
        while true; do
          echo "Wait for repo data";
          until [ -f "/builds/config/controller-config.toml" ]; do true; done;
          sleep 10;
          cat /builds/config/controller-config.toml | \
          sed 's/www\.opentalk\.test/localhost\:8443/g' > /tmp/controller-config.toml
          sed -i 's|http://accounts\.opentalk\.test/|https://localhost:7443/|g' /tmp/controller-config.toml
          sed -i 's|http://livekit\.opentalk\.test|https://localhost:7880|g' /tmp/controller-config.toml
          sed -i 's/@rabbitmq\//@localhost\//g' /tmp/controller-config.toml
          sed -i 's/@db\:/@localhost\:/g' /tmp/controller-config.toml
          sed -i 's/\/minio\:/\/localhost\:/g' /tmp/controller-config.toml
          echo "Try to start controller";
          /controller/opentalk-controller -c /tmp/controller-config.toml;
        done;
    healthcheck:
      test: /controller/opentalk-controller tenants list | grep OpenTalkDefaultTenant
      interval: 5s
      timeout: 5s
      retries: 30

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    depends_on:
      db:
        condition: service_healthy
      certs:
        condition: service_completed_successfully
    ports:
      - 127.0.0.1:7443:7443
    volumes:
      - ./:/builds/:rw,Z
      - certs-volume:/opt/keycloak/certs:ro
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres123
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HTTP_ENABLED: 'false'
      KC_HTTPS_PORT: 7443
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: 'true'
      KC_HOSTNAME_STRICT_HTTPS: 'true'
      KC_PROXY_HEADERS: xforwarded
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/fullchain.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/privkey.pem
    entrypoint:
      - /bin/bash
      - -c
      - |
        until [ -f "/builds/config/opentalk-realm.json" ]; do true; done;
        mkdir -p /opt/keycloak/data/import;
        cp /builds/config/opentalk-realm.json /opt/keycloak/data/import;
        /opt/keycloak/bin/kc.sh start-dev --import-realm --health-enabled=true
    healthcheck:
      test:
        - CMD-SHELL
        - >
          exec 3<>/dev/tcp/127.0.0.1/9000;
          echo -e "GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3;
          if [ $? -eq 0 ]; then echo Healthcheck Successful; exit 0;
          else echo Healthcheck Failed; exit 1; fi;
      interval: 5s
      timeout: 5s
      retries: 15

  test-runner:
    image: mcr.microsoft.com/playwright:v1.56.0-noble
    depends_on:
      controller:
        condition: service_healthy
      webapp:
        condition: service_healthy
    network_mode: host
    environment:
      NPM_CONFIG_LOG: /builds/.npm
    volumes:
      - ./:/builds/:rw,Z
    working_dir: /builds
    tty: true
    stdin_open: true
    entrypoint:
      - /bin/bash
      - -c
      - |
        cat /builds/config/test_env | \
        sed 's/https\:\/\/www\.opentalk\.test/https\:\/\/localhost\:8443/g' >  /builds/e2e/.env;
        sed -i 's|http://controller.opentalk.test|https://localhost:21311|g'  /builds/e2e/.env;
        npm ci
        npx playwright install
        bash

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certs-volume:/etc/nginx/certs:ro
    ports:
      - 8443:443
      - 7880:7880
      - 21311:11311
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - webapp
      - controller

  certs:
    image: mcr.microsoft.com/playwright:v1.56.0-noble
    volumes:
      - certs-volume:/certs
    entrypoint:
      - /bin/bash
      - -c
      - |
        mkdir -p /certs
        if [ ! -f /certs/fullchain.pem ]; then
          cd /certs
          openssl req -new -newkey rsa:2048 -nodes -keyout privkey.pem -subj "/CN=localhost" -out server.csr
          openssl x509 -req -days 365 -in server.csr -signkey privkey.pem -out fullchain.pem \
          -extfile <(printf "\
          basicConstraints=CA:FALSE\n\
          subjectAltName=DNS:localhost,IP:127.0.0.1\n\
          keyUsage=nonRepudiation,digitalSignature,keyEncipherment\n\
          extendedKeyUsage=serverAuth\
          ")
        fi
        find /certs -xtype l -delete
        chmod 644 /certs/*.pem

volumes:
  certs-volume:
